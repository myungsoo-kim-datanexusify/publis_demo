<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Demo - GTM Event Tracking</title>

    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-MMCZKWXL');</script>
    <!-- End Google Tag Manager -->

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 1.4em; }
        header span { font-size: 1.6em; }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 24px;
        }

        /* Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            font-size: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f0e8;
        }

        .card-body { padding: 14px; }
        .card-name { font-weight: 700; font-size: 1em; margin-bottom: 4px; }
        .card-desc { font-size: 0.82em; color: #666; margin-bottom: 12px; line-height: 1.4; }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .price { font-weight: 700; color: #667eea; font-size: 1.1em; }

        .btn-add {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px 14px;
            cursor: pointer;
            font-size: 0.85em;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-add:hover { background: #5566d4; }
        .btn-add.added {
            background: #4caf50;
        }

        /* Cart sidebar */
        .sidebar { position: sticky; top: 24px; align-self: start; }

        .cart-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 16px;
        }
        .cart-box h2 { font-size: 1em; font-weight: 700; margin-bottom: 14px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .cart-items { min-height: 60px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
            font-size: 0.88em;
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-name { flex: 1; }
        .cart-item-qty { color: #666; margin: 0 8px; }
        .cart-item-price { font-weight: 600; }
        .btn-remove { background: none; border: none; color: #e53935; cursor: pointer; font-size: 1em; padding: 0 4px; }

        .cart-empty { color: #aaa; font-size: 0.88em; text-align: center; padding: 12px 0; }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #eee;
        }

        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            transition: opacity 0.2s;
        }
        .btn-checkout:hover { opacity: 0.9; }
        .btn-checkout:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Event log */
        .event-log { background: #1e1e1e; border-radius: 12px; padding: 16px; }
        .event-log h2 { color: #ccc; font-size: 0.85em; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }

        #log-list {
            list-style: none;
            max-height: 260px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.75em;
        }
        #log-list li {
            padding: 5px 0;
            border-bottom: 1px solid #333;
            color: #a0aec0;
            word-break: break-all;
        }
        #log-list li:last-child { border-bottom: none; }
        .log-event { color: #79c0ff; font-weight: 700; }
        .log-time { color: #555; margin-right: 6px; }

        /* Purchase modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal h2 { font-size: 1.4em; margin-bottom: 8px; }
        .modal p { color: #666; margin-bottom: 20px; }
        .modal .success-icon { font-size: 3em; margin-bottom: 12px; }
        .btn-close {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 28px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MMCZKWXL"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<header>
    <span>🍽️</span>
    <h1>Restaurant AI Marketing — GTM Demo</h1>
</header>

<div class="layout">
    <!-- Menu -->
    <div>
        <div class="menu-grid" id="menu"></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="cart-box">
            <h2>🛒 Cart</h2>
            <div class="cart-items" id="cart-items">
                <p class="cart-empty">Your cart is empty</p>
            </div>
            <div class="cart-total" id="cart-total" style="display:none">
                <span>Total</span>
                <span id="total-price">$0.00</span>
            </div>
            <button class="btn-checkout" id="btn-checkout" disabled onclick="checkout()">
                Checkout
            </button>
        </div>

        <!-- Event Log -->
        <div class="event-log">
            <h2>📡 dataLayer Events</h2>
            <ul id="log-list">
                <li><span class="log-time">--:--:--</span>Waiting for events...</li>
            </ul>
        </div>
    </div>
</div>

<!-- Purchase success modal -->
<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="success-icon">✅</div>
        <h2>Order Placed!</h2>
        <p id="modal-msg">Thank you for your order.</p>
        <button class="btn-close" onclick="closeModal()">Continue Shopping</button>
    </div>
</div>

<script>
    // ── Menu data ─────────────────────────────────────────────────────────────
    const MENU = [
        { id: 'p1', name: 'Signature Burger',   emoji: '🍔', price: 14.90, category: 'Main' },
        { id: 'p2', name: 'Truffle Pasta',       emoji: '🍝', price: 18.50, category: 'Main' },
        { id: 'p3', name: 'Crispy Calamari',     emoji: '🦑', price: 11.00, category: 'Starter' },
        { id: 'p4', name: 'Caesar Salad',        emoji: '🥗', price: 9.90,  category: 'Starter' },
        { id: 'p5', name: 'Grilled Salmon',      emoji: '🐟', price: 22.00, category: 'Main' },
        { id: 'p6', name: 'Chocolate Lava Cake', emoji: '🍫', price: 7.50,  category: 'Dessert' },
    ];

    let cart = {};   // { id: { item, qty } }

    // ── GTM / dataLayer helper ────────────────────────────────────────────────
    window.dataLayer = window.dataLayer || [];

    function pushEvent(eventName, payload) {
        const data = { event: eventName, ...payload };
        dataLayer.push(data);
        logEvent(eventName, payload);
    }

    // ── Event log UI ──────────────────────────────────────────────────────────
    function logEvent(eventName, payload) {
        const list = document.getElementById('log-list');
        // Remove the placeholder on first real event
        if (list.children.length === 1 && list.children[0].textContent.includes('Waiting')) {
            list.innerHTML = '';
        }
        const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
        const li = document.createElement('li');
        const detail = JSON.stringify(payload).slice(0, 80);
        li.innerHTML = `<span class="log-time">${now}</span><span class="log-event">${eventName}</span> ${detail}`;
        list.prepend(li);
    }

    // ── Render menu ───────────────────────────────────────────────────────────
    function renderMenu() {
        const container = document.getElementById('menu');
        container.innerHTML = MENU.map(item => `
            <div class="card" id="card-${item.id}" onclick="viewItem('${item.id}')">
                <div class="card-img">${item.emoji}</div>
                <div class="card-body">
                    <div class="card-name">${item.name}</div>
                    <div class="card-desc">${item.category} · Made fresh daily</div>
                    <div class="card-footer">
                        <span class="price">$${item.price.toFixed(2)}</span>
                        <button class="btn-add" id="btn-${item.id}"
                            onclick="event.stopPropagation(); addToCart('${item.id}')">
                            + Add
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ── Events ────────────────────────────────────────────────────────────────
    function viewItem(id) {
        const item = MENU.find(m => m.id === id);
        pushEvent('view_item', {
            currency: 'USD',
            value: item.price,
            items: [{ item_id: item.id, item_name: item.name, price: item.price, item_category: item.category }]
        });
    }

    function addToCart(id) {
        const item = MENU.find(m => m.id === id);
        if (cart[id]) {
            cart[id].qty += 1;
        } else {
            cart[id] = { item, qty: 1 };
        }

        // Visual feedback
        const btn = document.getElementById(`btn-${id}`);
        btn.textContent = `✓ ${cart[id].qty}`;
        btn.classList.add('added');

        pushEvent('add_to_cart', {
            currency: 'USD',
            value: item.price,
            items: [{ item_id: item.id, item_name: item.name, price: item.price, quantity: cart[id].qty }]
        });

        renderCart();
    }

    function removeFromCart(id) {
        delete cart[id];
        const btn = document.getElementById(`btn-${id}`);
        if (btn) { btn.textContent = '+ Add'; btn.classList.remove('added'); }
        renderCart();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalEl   = document.getElementById('cart-total');
        const totalPrice = document.getElementById('total-price');
        const checkoutBtn = document.getElementById('btn-checkout');

        const entries = Object.values(cart);
        if (entries.length === 0) {
            container.innerHTML = '<p class="cart-empty">Your cart is empty</p>';
            totalEl.style.display = 'none';
            checkoutBtn.disabled = true;
            return;
        }

        const total = entries.reduce((s, e) => s + e.item.price * e.qty, 0);
        container.innerHTML = entries.map(({ item, qty }) => `
            <div class="cart-item">
                <span class="cart-item-name">${item.emoji} ${item.name}</span>
                <span class="cart-item-qty">×${qty}</span>
                <span class="cart-item-price">$${(item.price * qty).toFixed(2)}</span>
                <button class="btn-remove" onclick="removeFromCart('${item.id}')">✕</button>
            </div>
        `).join('');

        totalEl.style.display = 'flex';
        totalPrice.textContent = `$${total.toFixed(2)}`;
        checkoutBtn.disabled = false;
    }

    function checkout() {
        const entries = Object.values(cart);
        const total   = entries.reduce((s, e) => s + e.item.price * e.qty, 0);
        const items   = entries.map(({ item, qty }) => ({
            item_id:       item.id,
            item_name:     item.name,
            price:         item.price,
            quantity:      qty,
            item_category: item.category
        }));

        // begin_checkout
        pushEvent('begin_checkout', { currency: 'USD', value: total, items });

        // Simulate payment delay → purchase
        setTimeout(() => {
            const transactionId = 'TXN-' + Date.now();
            pushEvent('purchase', {
                transaction_id: transactionId,
                currency:       'USD',
                value:          total,
                tax:            +(total * 0.08).toFixed(2),
                items
            });

            document.getElementById('modal-msg').textContent =
                `Transaction ${transactionId} · Total $${total.toFixed(2)}`;
            document.getElementById('modal').classList.add('show');

            // Reset cart
            cart = {};
            document.querySelectorAll('.btn-add').forEach(b => {
                b.textContent = '+ Add';
                b.classList.remove('added');
            });
            renderCart();
        }, 800);
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('show');
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    renderMenu();

    // Fire page_view on load
    pushEvent('page_view', {
        page_title:    'Restaurant Menu',
        page_location: window.location.href,
        restaurant_id: 'restaurant_demo_01'
    });
</script>
</body>
</html>
